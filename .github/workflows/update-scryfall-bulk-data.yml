name: Update Scryfall Bulk Data

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC — after Scryfall typically publishes nightly updates
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: scryfall-bulk-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest Scryfall bulk data
        id: download
        run: |
          UA="box-packer/1.0 (github.com/${{ github.repository }})"
          BULK_META=$(curl -sf -A "$UA" https://api.scryfall.com/bulk-data)

          DOWNLOAD_URI=$(echo "$BULK_META" | python3 -c "
          import json, sys
          for item in json.load(sys.stdin)['data']:
              if item['type'] == 'default_cards':
                  print(item['download_uri']); break
          ")

          UPDATED_DATE=$(echo "$BULK_META" | python3 -c "
          import json, sys
          for item in json.load(sys.stdin)['data']:
              if item['type'] == 'default_cards':
                  print(item['updated_at'][:10]); break
          ")

          echo "date=${UPDATED_DATE}" >> "$GITHUB_OUTPUT"
          CARDS_FILE="data/scryfall/default-cards-${UPDATED_DATE}.json.gz"
          SETS_FILE="data/scryfall/sets-${UPDATED_DATE}.json.gz"

          if [[ -f "$CARDS_FILE" && -f "$SETS_FILE" ]]; then
            echo "Already have data for ${UPDATED_DATE}, skipping."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skipped=false" >> "$GITHUB_OUTPUT"

          [[ -f "$CARDS_FILE" ]] || curl -sf -L -A "$UA" "$DOWNLOAD_URI" | gzip > "$CARDS_FILE"

          [[ -f "$SETS_FILE" ]] || curl -sf -A "$UA" https://api.scryfall.com/sets \
            | python3 -c "import json,sys; print(json.dumps(json.load(sys.stdin)['data'], indent=2))" \
            | gzip > "$SETS_FILE"

      - name: Remove files beyond the 3 most recent
        if: steps.download.outputs.skipped != 'true'
        run: |
          ls -1 data/scryfall/default-cards-*.json.gz 2>/dev/null \
            | sort -r | tail -n +4 | xargs -r rm --
          ls -1 data/scryfall/sets-*.json.gz 2>/dev/null \
            | sort -r | tail -n +4 | xargs -r rm --

      - name: Commit and push
        if: steps.download.outputs.skipped != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scryfall/
          git diff --staged --quiet || \
            git commit -m "chore: update Scryfall bulk data ${{ steps.download.outputs.date }}"
          git push
